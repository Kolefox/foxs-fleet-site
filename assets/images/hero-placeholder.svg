<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hero image placeholder</title>
  <desc id="desc">Replace this file with the final hero background image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#1f1b12" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1320" cy="180" r="240" fill="#c9a84c" opacity="0.14" />
  <circle cx="320" cy="760" r="280" fill="#c9a84c" opacity="0.08" />
  <rect x="90" y="90" width="1420" height="720" rx="34" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.65" />
  <text x="800" y="390" fill="#ffffff" font-family="Georgia, serif" font-size="82" font-weight="700" letter-spacing="5" text-anchor="middle">
    REPLACE HERO IMAGE
  </text>
  <text x="800" y="455" fill="#c9a84c" font-family="Arial, sans-serif" font-size="30" letter-spacing="8" text-anchor="middle">
    assets/images/hero-placeholder.svg
  </text>
</svg>
